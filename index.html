<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美軍場地 座位表</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,"PingFang TC","Helvetica Neue",sans-serif; background:#F0EDE8; color:#1a1a1a; padding:10px; font-size:12px; }
h1 { font-size:16px; letter-spacing:2px; text-align:center; margin-bottom:2px; }
.sub { text-align:center; font-size:10px; color:#999; letter-spacing:1px; margin-bottom:8px; }
.toolbar { display:flex; gap:5px; justify-content:center; flex-wrap:wrap; margin-bottom:8px; }
.btn { background:#1a1a1a; color:#fff; border:none; padding:7px 11px; border-radius:5px; font-size:11px; cursor:pointer; }
.btn.ghost { background:#fff; color:#1a1a1a; border:1px solid #bbb; }
.stat { text-align:center; font-size:11px; color:#666; margin-bottom:6px; }
.stat b { color:#1a1a1a; }
.legend { display:flex; gap:12px; justify-content:center; margin-bottom:8px; flex-wrap:wrap; }
.leg { display:flex; align-items:center; gap:4px; font-size:10px; color:#555; }
.leg-box { width:12px; height:12px; border-radius:2px; border:1px solid #ccc; }

.venue-wrap { max-width:1100px; margin:0 auto; background:#fff; border-radius:10px; padding:12px; box-shadow:0 2px 12px rgba(0,0,0,.08); overflow-x:auto; }
.screen-bar { text-align:center; font-size:10px; background:#1a1a1a; color:#fff; border-radius:6px 6px 0 0; padding:7px; letter-spacing:4px; margin-bottom:0; }
.stage-zone { background:#E8E8E8; border:2px solid #1a1a1a; border-top:none; border-radius:0 0 6px 6px; padding:8px; margin-bottom:8px; }
.stage-row { display:flex; gap:4px; justify-content:center; flex-wrap:nowrap; overflow-x:auto; min-width:0; }
.stage-row .hcard { min-width:0; flex:1; max-width:200px; }
.venue-layout { display:grid; grid-template-columns:170px 1fr 170px; gap:8px; min-width:680px; }
.side-col { display:flex; flex-direction:column; gap:5px; }
.highchair-zone { background:#FFF8E6; border:2.5px solid #D4A017; border-radius:8px; padding:8px; display:flex; flex-direction:column; gap:5px; }
.highchair-top-label { text-align:center; font-size:9px; font-weight:700; color:#8a5e00; background:#fff; border:1.5px solid #D4A017; border-radius:4px; padding:3px 0; letter-spacing:1px; }
.left-col-wrap { display:flex; flex-direction:column; gap:5px; }
.center-col { display:flex; flex-direction:column; gap:6px; }
.pool-zone { background:#E8F2E4; border:2.5px solid #5A8A52; border-radius:8px; padding:8px; }
.pool-label { text-align:center; font-size:10px; font-weight:700; color:#3d6636; letter-spacing:2px; margin-bottom:6px; background:#fff; border:1.5px solid #5A8A52; border-radius:4px; padding:2px 0; }
.pool-grid { display:flex; flex-direction:column; gap:6px; }
.pool-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
.main-zone { display:flex; justify-content:center; padding:5px 0 2px; }
.bar-area { margin-top:6px; display:flex; flex-direction:column; gap:3px; }
.bar-block { text-align:center; font-size:10px; border-radius:4px; padding:4px; letter-spacing:1px; }
.bar-drink { background:#ADD8E6; color:#1a4a5a; border:1px solid #7ab8cc; }
.bar-bar { background:#E8A090; color:#7a2010; border:1px solid #d07060; font-size:12px; font-weight:700; }
.bar-av { background:#F5C87A; color:#6a4a10; border:1px solid #d0a050; }
.bottom-row { display:flex; justify-content:space-between; margin-top:8px; align-items:flex-end; }
.buffet-box { background:#F0EDE8; border:1.5px solid #C0B8AC; border-radius:5px; padding:6px 16px; font-size:10px; color:#888; letter-spacing:2px; }
.stair-box { background:#F5EDD5; border:1.5px solid #C4A84B; border-radius:4px; font-size:9px; color:#8a7020; padding:3px 8px; letter-spacing:1px; }
.stairs-row { display:flex; justify-content:space-between; margin-bottom:5px; }

/* ── 桌卡通用 ── */
.tcard { border-radius:6px; position:relative; }

/* 樓上橫桌：上排3｜桌名（橫書）｜下排3，垂直堆疊 */
.hcard { border:1.5px solid #888; background:#FAFAFA; display:flex; flex-direction:column; min-width:148px; }
.hcard .h-row { display:grid; grid-template-columns:repeat(3,1fr); gap:2px; padding:3px 3px; }
.hcard .table-mid { text-align:center; font-size:8px; font-weight:700; color:#777; letter-spacing:1px; background:#F0F0F0; border-top:1px solid #ddd; border-bottom:1px solid #ddd; padding:3px 4px; cursor:pointer; }
.hcard .table-mid:hover { background:#E8E4DC; }

/* 下沉直桌：左排｜[桌名]｜右排，橫向排列 */
.vcard { border:1.5px solid #5A8A52; background:#F2FAF0; display:flex; flex-direction:column; min-width:170px; }
.vcard .tlabel-center { font-size:9px; font-weight:700; text-align:center; background:#5A8A52; color:#fff; padding:2px 4px; letter-spacing:1px; display:none; }
.vcard .v-body { display:flex; align-items:stretch; }
.vcard .v-seats { display:flex; flex-direction:column; gap:2px; padding:3px 2px; flex:1; }
.vcard .table-mid { display:flex; align-items:center; justify-content:center; font-size:8px; color:#3d6636; font-weight:700; letter-spacing:1px; padding:2px 4px; background:#D4EAD0; border-left:1px solid #5A8A52; border-right:1px solid #5A8A52; cursor:pointer; width:28px; min-width:28px; text-align:center; word-break:break-all; line-height:1.4; white-space:normal; }
.end-seat-wrap { display:flex; justify-content:center; margin:2px 0; }
.end-seat-wrap input.seat { width:60%; max-width:80px; font-size:8px; }
.hcard .end-seat-wrap { margin:1px 0; }
.hcard .end-seat-wrap input.seat { width:24px; min-width:24px; max-width:28px; font-size:7px; padding:2px 1px; text-align:center; }
.end-seat-btn { font-size:9px; color:#5A8A52; cursor:pointer; text-align:center; padding:2px; opacity:0.6; }
.end-seat-btn:hover { opacity:1; }
.vcard .table-mid:hover { background:#C0E0B8; }

/* 主桌 */
.maincard { border:2px solid #B8944A; background:#FBF5E6; display:flex; flex-direction:column; min-width:200px; }
.maincard .tlabel-center { font-size:9px; font-weight:700; text-align:center; background:#B8944A; color:#fff; padding:2px 4px; letter-spacing:2px; }
.maincard .m-body { display:flex; align-items:stretch; gap:0; }
.maincard .m-seats { display:flex; flex-direction:column; gap:2px; padding:5px 3px; flex:1; }
.maincard .table-mid { display:flex; align-items:center; justify-content:center; writing-mode:vertical-rl; font-size:9px; color:#9a7a30; font-weight:700; letter-spacing:1px; padding:0 4px; background:#F0E4C0; border-left:1px solid #B8944A; border-right:1px solid #B8944A; cursor:pointer; }
.maincard .table-mid:hover { background:#E8D4A0; }

/* 座位格 */
.seat { font-size:8.5px; background:#F0F0F0; border-radius:3px; padding:3px 4px; cursor:text; white-space:nowrap; overflow:hidden; line-height:1.4; border:1px solid transparent; outline:none; min-height:18px; width:100%; box-sizing:border-box; font-family:inherit; }
.seat:hover { background:#E8E4DC; }
.seat:focus { background:#fff; border-color:#5A8A52; box-shadow:0 0 0 2px rgba(90,138,82,.2); }
.seat.empty-s { color:#bbb; }
.seat.filled { background:#E8E2D9; color:#1a1a1a; border-color:#ccc; }
.seat.veg { background:#D4EDCC; color:#2d6a21; border-color:#5a9a4a; }
.seat.kid { background:#FCE8CF; color:#9a4e10; border-color:#c08040; }
.seat.help { background:#E8E0F5; color:#5a2d8a; border-color:#9a70cc; }

/* 主桌座位大一點 */
.maincard .seat { font-size:10px; padding:6px 4px; }
input.seat { -webkit-appearance:none; appearance:none; }

.empty-cell { border:1.5px dashed #C0B8AC; border-radius:6px; min-width:140px; min-height:50px; display:flex; align-items:center; justify-content:center; font-size:10px; color:#C0B8AC; cursor:pointer; }
.empty-cell:hover { background:#F5F0EA; border-color:#888; color:#666; }
.pool-empty { border-color:#7ABB72; color:#7ABB72; min-width:160px; min-height:60px; }
.pool-empty:hover { background:#E8F5E4; }

/* 彈窗 */
.mask { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; z-index:100; padding:14px; }
.mask.show { display:flex; }
.sheet { background:#fff; width:100%; max-width:380px; border-radius:14px; padding:18px; max-height:92vh; overflow-y:auto; }
.sheet h3 { font-size:15px; margin-bottom:3px; text-align:center; }
.sheet .diag { font-size:10px; color:#999; text-align:center; margin-bottom:10px; }
.srow { display:flex; align-items:center; gap:5px; margin-bottom:6px; }
.srow .no { width:32px; font-size:10px; color:#aaa; flex-shrink:0; text-align:right; }
.srow input { flex:1; border:1px solid #ddd; border-radius:5px; padding:7px 8px; font-size:14px; }
.tag-btn { border:1px solid #ddd; background:#fff; border-radius:5px; padding:6px 7px; font-size:11px; cursor:pointer; flex-shrink:0; }
.tag-btn.on-veg { background:#D4EDCC; border-color:#3a7d2c; color:#3a7d2c; }
.tag-btn.on-kid { background:#FCE8CF; border-color:#b5651d; color:#b5651d; }
.tag-btn.on-help { background:#E8E0F5; border-color:#7b4fc9; color:#7b4fc9; }
.name-row { display:flex; align-items:center; gap:6px; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid #eee; }
.name-row label { font-size:11px; color:#666; flex-shrink:0; }
.name-row input { flex:1; border:1px solid #ddd; border-radius:5px; padding:6px 8px; font-size:13px; font-weight:700; }
.sheet-footer { display:flex; gap:8px; margin-top:14px; }
.sheet-footer .btn { flex:1; }
.del-link { text-align:center; margin-top:8px; }
.del-link button { background:none; border:none; color:#c0392b; font-size:11px; text-decoration:underline; cursor:pointer; }

.save-status { text-align:center; font-size:10px; color:#aaa; min-height:16px; margin-bottom:4px; }
.save-status.saving { color:#f0a500; }
.save-status.saved { color:#5A8A52; }
.save-status.error { color:#c0392b; }
@media print {
  @page { size: A4 landscape; margin: 5mm; }
  html, body { margin:0; padding:0; background:#fff; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .toolbar,.stat,.save-status,.mask,.hint-bar,.legend { display:none !important; }
  #print-wrapper {
    transform-origin: top left;
    transform: scale(0.55);
    width: 182%;
    margin-bottom: -45%;
  }
  .venue-layout { grid-template-columns:240px 1fr 240px; gap:6px; }
  .hcard { min-width:0; }
  .vcard { min-width:0; }
  h1 { font-size:16px; margin-bottom:1px; }
  .sub { font-size:9px; margin-bottom:1px; }
  #coupleTitle { font-size:10px; margin-bottom:3px; }
  .venue-wrap { box-shadow:none; padding:6px; max-width:100%; }
  .empty-cell { display:none !important; }
  body.place-empty .seat.empty-s::after { content:"　"; display:block; }
}
</style>
</head>
<body>
<div id="print-wrapper">
<h1>婚宴座位表</h1>
<div class="sub">美軍俱樂部 BRICK YARD 33⅓ × 想樂創意</div>
<div class="sub" id="coupleTitle" style="font-size:12px;color:#888;margin-bottom:4px;"></div>
<div class="save-status" id="saveStatus"></div>
<div class="toolbar">
  <button class="btn ghost" id="addPoolBtn">＋ 水池桌</button>
  <button class="btn ghost" id="addStageBtn">＋ 舞台桌</button>
  <button class="btn ghost" id="renumberBtn">重新編列桌號</button>
  <button class="btn ghost" id="clearBtn">清除姓名</button>
  <button class="btn" id="printBtn">列印 / PDF</button>
</div>
<div style="text-align:center;margin-bottom:6px;font-size:13px;">
  空位是否擺放餐具：
  <label style="margin:0 8px;cursor:pointer;"><input type="radio" name="emptyPlace" id="ep_yes" value="yes"> 擺</label>
  <label style="cursor:pointer;"><input type="radio" name="emptyPlace" id="ep_no" value="no" checked> 不擺</label>
</div>
<div class="stat">座位數 <b id="totalcap">0</b> 位（含新人 <b id="maincap">0</b> 位）　已排 <b id="seated">0</b> 人　空 <b id="emptyc">0</b>　素 <b id="vegc">0</b>　童 <b id="kidc">0</b>　共 <b id="tablec">0</b> 桌</div>
<div style="text-align:center;font-size:11px;color:#666;margin-bottom:6px;background:#fff8e8;border:1px solid #e8d88a;border-radius:6px;padding:6px 12px;">
  📝 點選座位格直接輸入姓名　·　<b>右鍵（手機長按）</b>可標記素食 🌿、兒童椅 🪑 或協助送餐 🍽️　·　點選<b>桌號</b>可編輯桌次名稱及刪除桌次
</div>
<div class="legend">
  <div class="leg"><div class="leg-box" style="background:#E8E2D9;border-color:#999;"></div>已填</div>
  <div class="leg"><div class="leg-box" style="background:#D4EDCC;border-color:#5a9a4a;"></div>素食</div>
  <div class="leg"><div class="leg-box" style="background:#FCE8CF;border-color:#c08040;"></div>兒童椅</div>
  <div class="leg"><div class="leg-box" style="background:#E8E0F5;border-color:#9a70cc;"></div>協助送餐</div>
  <div class="leg"><div class="leg-box" style="background:#E8F2E4;border-color:#5A8A52;"></div>水池區</div>
</div>

<div class="venue-wrap">
  <div class="screen-bar">投 影 幕 ／ 舞 台</div>
  <div class="stage-zone">
    <div class="stage-row" id="stageRow"></div>
  </div>
  <div class="venue-layout">
    <div class="left-col-wrap">
      <div class="highchair-zone">
      <div class="highchair-top-label">🪑 高腳椅區・兒童椅不適合此區</div>
      <div class="side-col" id="leftCol"></div>
    </div>
    </div>
    <div class="center-col">
      <div class="pool-zone">
        <div class="pool-label">▼ 水 池 區 ▼</div>
        <div class="pool-grid" id="poolGrid"></div>
        <div class="main-zone" id="mainZone"></div>
        <div class="bar-area">
          <div class="bar-block bar-drink">飲 料 區</div>
          <div style="display:flex;gap:4px;align-items:stretch;">
            <div class="stair-box" style="flex-shrink:0;display:flex;align-items:center;">樓梯</div>
            <div class="bar-block bar-bar" style="flex:1;margin:0;font-size:14px;">Bar</div>
            <div class="stair-box" style="flex-shrink:0;display:flex;align-items:center;">樓梯</div>
          </div>
        </div>
      </div>
    </div>
    <div class="side-col" id="rightCol"></div>
  </div>
  <div style="max-width:1100px;margin:6px auto 0;">
    <div class="bar-block bar-av" style="width:100%;padding:5px 0;">影 音 控 台</div>
  </div>
  <div class="bottom-row">
    <div class="buffet-box">餐 檯</div>
    <div style="font-size:10px;color:#aaa;align-self:center;">斜 坡 ／ 入 口</div>
    <div class="buffet-box">餐 檯</div>
  </div>
</div>

</div><!-- /print-wrapper -->
<!-- 彈窗 -->
<div class="mask" id="mask">
  <div class="sheet">
    <h3 id="mTitle">編輯</h3>
    <div class="diag" id="mDiag"></div>
    <div class="name-row">
      <label>桌名</label>
      <input type="text" id="tableNameInput" placeholder="自訂桌名">
    </div>
    <div id="seatList"></div>
    <div id="endSeatOptions" style="margin-top:10px;display:none;border-top:1px solid #eee;padding-top:10px;">
      <div style="font-size:12px;color:#666;margin-bottom:6px;">側邊椅（在桌子短邊加一張椅子）</div>
      <div id="endSeatBtns" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
    </div>
    <div class="sheet-footer">
      <button class="btn ghost" id="cancelBtn">取消</button>
      <button class="btn" id="saveBtn">儲存</button>
    </div>
    <div class="del-link" id="delWrap"><button id="delBtn">刪除此桌</button></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

  // ── GAS 串接 ──────────────────────────────────
  var GAS_MODE = true;
  var BASE_URL = 'https://script.google.com/macros/s/AKfycbwV3pXKiwOBCbvv_W0ysv1_mjGsAnK4VqKQI5-jAbjDWGgEaBpVJufiszaVhYsc73Lg/exec';
  // TOKEN 從 URL 參數讀取
  var TOKEN = (function(){
    var m = location.search.match(/[?&]token=([^&]+)/);
    return m ? decodeURIComponent(m[1]) : null;
  })();
  var ORDER = null;
  var SEAT_SAVED = null;

  function setStatus(cls, msg) {
    var el = document.getElementById('saveStatus');
    el.className = 'save-status ' + cls; el.textContent = msg;
  }
  function timeStr() {
    var d=new Date(); return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
  }

  // 自動儲存
  var saveTimer = null;
  function scheduleSave() {
    if (!GAS_MODE || !TOKEN) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(doSave, 1200);
  }
  function doSave() {
    if (!TOKEN) return;
    setStatus('saving', '儲存中…');
    var payload = { tables: tables, poolSlots: poolSlots };
    var seatStr = JSON.stringify(payload);
    var getUrl = BASE_URL + '?action=saveSeatData&token=' + encodeURIComponent(TOKEN) + '&seat=' + encodeURIComponent(seatStr);
    if (getUrl.length <= 2000) {
      fetch(getUrl)
        .then(function(){ setStatus('saved', '✓ 已儲存 ' + timeStr()); })
        .catch(function(e){ setStatus('error', '儲存失敗：' + e.message); });
    } else {
      fetch(BASE_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ token: TOKEN, action: 'saveSeatData', seat: payload })
      })
      .then(function(){ setStatus('saved', '✓ 已儲存 ' + timeStr()); })
      .catch(function(e){ setStatus('error', '儲存失敗：' + e.message); });
    }
  }

  var MAX_STAGE = 4;   // 舞台最多4桌
  var MAX_POOL = 11;   // 下沉最多11桌（3欄×4行，最後一行中間留主桌）
  // 左右側各固定6桌，不增減

  var seq = 0;
  var tables = [];
  var editing = null, draft = null, draftName = null;
  // 固定12個格位，index 10 永遠是走道，null = 空格
  var poolSlots = [];
  for (var _i=0;_i<12;_i++) poolSlots.push(null);

  function mkSeats(n) {
    var a = [];
    for (var i = 0; i < n; i++) a.push({ name: '', veg: false, kid: false, help: false });
    return a;
  }
  function clone(o) { return JSON.parse(JSON.stringify(o)); }
  function get(id) { return tables.filter(function(t){ return t.id===id; })[0]; }
  function esc(s) {
    return String(s).replace(/[&<>"]/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];
    });
  }
  function countZone(zone) { return tables.filter(function(t){ return t.zone===zone && t.type!=='m'; }).length; }

  function addTable(zone, type, label, slotIdx) {
    var n = type === 'm' ? 2 : 6;
    var t = { id: ++seq, zone: zone, type: type, label: label||'', seats: mkSeats(n), slotIdx: (slotIdx !== undefined ? slotIdx : -1) };
    tables.push(t);
    if (zone === 'pool' && type === 'v' && slotIdx !== undefined) poolSlots[slotIdx] = t.id;
    return t;
  }

  function seed() {
    for (var i=1;i<=6;i++) addTable('left','h',i+'桌');
    for (var i=7;i<=12;i++) addTable('right','h',i+'桌');
    // pool 固定格位 0-11，跳過 10（走道）= 11 個格位
    var pn=13;
    for (var s=0;s<12;s++){
      if(s===10) continue; // 走道
      addTable('pool','v',pn+'桌',s);
      pn++;
    }
    for (var i=24;i<=27;i++) addTable('stage','v',i+'桌');
    addTable('pool','m','主桌');
    render();
  }

  function seatLabels(type, idx) {
    if (type==='h') return ['A','B','C','D','E','F'][idx];
    if (type==='v') return ['左1','左2','左3','右1','右2','右3'][idx];
    return idx===0?'新郎':'新娘';
  }

  function makeSeat(t, idx) {
    var s = t.seats[idx];
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'seat' + (!s.name.trim() ? ' empty-s' : s.veg ? ' veg' : s.kid ? ' kid' : s.help ? ' help' : ' filled');
    inp.value = s.name.trim();
    inp.placeholder = seatLabels(t.type, idx);
    var composing = false;
    inp.addEventListener('compositionstart', function(){ composing = true; });
    inp.addEventListener('compositionend', function(){ composing = false; });
    inp.onblur = function(){
      if (composing) return;
      s.name = inp.value.trim();
      inp.value = s.name;
      inp.className = 'seat' + (!s.name ? ' empty-s' : s.veg ? ' veg' : s.kid ? ' kid' : s.help ? ' help' : ' filled');
      updateStat();
      scheduleSave();
    };
    inp.onkeydown = function(e){ if(e.key==='Enter' && !composing) inp.blur(); };
    inp.oncontextmenu = function(e){
      e.preventDefault(); e.stopPropagation();
      showTagMenu(e, s, inp, seatLabels(t.type, idx));
    };
    var _pressTimer = null;
    inp.addEventListener('touchstart', function(e){
      _pressTimer = setTimeout(function(){
        var touch = e.touches[0];
        showTagMenu({ clientX: touch.clientX, clientY: touch.clientY, preventDefault: function(){}, stopPropagation: function(){} }, s, inp, seatLabels(t.type, idx));
      }, 600);
    }, { passive: true });
    inp.addEventListener('touchend', function(){ clearTimeout(_pressTimer); }, { passive: true });
    inp.addEventListener('touchmove', function(){ clearTimeout(_pressTimer); }, { passive: true });
    // 手機長按
    var pressTimer = null;
    var touchX = 0, touchY = 0;
    inp.addEventListener('touchstart', function(e){
      touchX = e.touches[0].clientX;
      touchY = e.touches[0].clientY;
      pressTimer = setTimeout(function(){
        showTagMenu({ clientX: touchX, clientY: touchY }, s, inp, seatLabels(t.type, idx));
      }, 600);
    }, { passive: true });
    inp.addEventListener('touchend', function(){ clearTimeout(pressTimer); });
    inp.addEventListener('touchmove', function(){ clearTimeout(pressTimer); });
    return inp;
  }

  function refreshSeat(inp, s, lbl) {
    inp.value = s.name;
    inp.className = 'seat' + (!s.name.trim() ? ' empty-s' : s.veg ? ' veg' : s.kid ? ' kid' : s.help ? ' help' : ' filled');
    updateStat();
    scheduleSave();
  }

  // 小浮動選單（素食/兒童）
  function showTagMenu(e, s, seatDiv, lbl) {
    var old = document.getElementById('tagMenu'); if(old) old.remove();
    var menu = document.createElement('div'); menu.id='tagMenu';
    menu.style.cssText='position:fixed;z-index:200;background:#fff;border:1px solid #ddd;border-radius:8px;padding:6px;display:flex;flex-direction:column;gap:4px;box-shadow:0 4px 16px rgba(0,0,0,.15);font-size:12px;min-width:100px;';
    menu.style.left = Math.min(e.clientX, window.innerWidth-120)+'px';
    menu.style.top = Math.min(e.clientY, window.innerHeight-100)+'px';

    function mkItem(label, active, toggle) {
      var b=document.createElement('button');
      b.style.cssText='border:1px solid #ddd;border-radius:5px;padding:5px 8px;cursor:pointer;text-align:left;background:'+(active?'#D4EDCC':'#fff')+';color:'+(active?'#2d6a21':'#333')+';';
      b.textContent = (active?'✓ ':'')+label;
      b.onclick=function(){ toggle(); menu.remove(); refreshSeat(seatDiv,s,lbl); };
      return b;
    }
    menu.appendChild(mkItem('素食', s.veg, function(){ s.veg=!s.veg; if(s.veg){s.kid=false;s.help=false;} }));
    menu.appendChild(mkItem('兒童椅', s.kid, function(){ s.kid=!s.kid; if(s.kid){s.veg=false;s.help=false;} }));
    menu.appendChild(mkItem('協助送餐', s.help, function(){ s.help=!s.help; }));
    var sep=document.createElement('hr'); sep.style.cssText='border:none;border-top:1px solid #eee;margin:2px 0;'; menu.appendChild(sep);
    var clr=document.createElement('button');
    clr.style.cssText='border:1px solid #ddd;border-radius:5px;padding:5px 8px;cursor:pointer;text-align:left;background:#fff;color:#c0392b;';
    clr.textContent='清除姓名';
    clr.onclick=function(){ s.name=''; s.veg=false; s.kid=false; s.help=false; seatDiv.textContent=''; refreshSeat(seatDiv,s,lbl); menu.remove(); };
    menu.appendChild(clr);
    document.body.appendChild(menu);
    setTimeout(function(){ document.addEventListener('click', function h(){ menu.remove(); document.removeEventListener('click',h); }); },10);
  }

  function makeMid(t) {
    var div = document.createElement('div');
    div.className = 'table-mid';
    div.textContent = t.label;
    div.title = '點擊改桌名';
    div.onclick = function(e){ e.stopPropagation(); openSheet(t.id, null); };
    return div;
  }

  // 橫桌：上排3｜桌名（橫書）｜下排3，垂直堆疊
  function makeHCard(t, opts) {
    opts = opts || {};
    var div = document.createElement('div');
    div.className = 'tcard hcard';
    // 用 flex row 包住：左側邊椅 + 桌子主體
    var wrapper = document.createElement('div');
    wrapper.style.cssText = 'display:flex;flex-direction:row;align-items:stretch;width:100%';
    // 左側邊椅（A/D旁，走道側）
    if (t.endSeats && t.endSeats.left !== undefined) {
      var ls = makeEndSeat(t, 'left');
      ls.style.cssText = 'display:flex;flex-direction:column;justify-content:center;padding:2px 2px;min-width:28px;border-right:1px solid #ddd;margin-right:2px;';
      wrapper.appendChild(ls);
    }
    // 桌子主體
    var body = document.createElement('div');
    body.style.cssText = 'flex:1;min-width:0;';
    // 上排3
    var topRow = document.createElement('div'); topRow.className = 'h-row';
    for (var i=0;i<3;i++) topRow.appendChild(makeSeat(t,i));
    // 桌名橫條
    var mid = document.createElement('div'); mid.className = 'table-mid';
    mid.textContent = t.label; mid.title = '點擊改桌名';
    mid.onclick = function(e){ e.stopPropagation(); openSheet(t.id, null); };
    // 下排3
    var botRow = document.createElement('div'); botRow.className = 'h-row';
    for (var i=3;i<6;i++) botRow.appendChild(makeSeat(t,i));
    body.appendChild(topRow); body.appendChild(mid); body.appendChild(botRow);
    wrapper.appendChild(body);
    div.appendChild(wrapper);
    return div;
  }

  // 直桌：左3｜桌名｜右3，可選端椅（endTop/endBot）
  function makeVCard(t, opts) {
    opts = opts || {};
    var div = document.createElement('div');
    div.className = 'tcard vcard';
    // 短邊椅（上方），只在 endSeats.top 存在時顯示
    if (t.endSeats && t.endSeats.top !== undefined) {
      div.appendChild(makeEndSeat(t, 'top'));
    }
    var body = document.createElement('div');
    body.className = 'v-body';
    var lc = document.createElement('div'); lc.className = 'v-seats';
    for (var i=0;i<3;i++) lc.appendChild(makeSeat(t,i));
    var mid = makeMid(t);
    var rc = document.createElement('div'); rc.className = 'v-seats';
    for (var i=3;i<6;i++) rc.appendChild(makeSeat(t,i));
    body.appendChild(lc); body.appendChild(mid); body.appendChild(rc);
    div.appendChild(body);
    // 短邊椅（下方），只在 endSeats.bot 存在時顯示
    if (t.endSeats && t.endSeats.bot !== undefined) {
      div.appendChild(makeEndSeat(t, 'bot'));
    }
    // 側邊椅（橫桌用左右欄式）
    if (opts.endTop) { div.insertBefore(makeEndSeat(t,'top'), div.firstChild); }
    if (opts.endBot) { div.appendChild(makeEndSeat(t,'bot')); }
    return div;
  }

  // 端椅槽：一個置中的 seat input
  function makeEndSeat(t, pos) {
    if (!t.endSeats) t.endSeats = {};
    if (!t.endSeats[pos]) t.endSeats[pos] = { name: '', veg: false, kid: false, help: false };
    var s = t.endSeats[pos];
    var wrap = document.createElement('div'); wrap.className = 'end-seat-wrap';
    var inp = document.createElement('input'); inp.type='text'; inp.className='seat'; inp.value=s.name;
    inp.placeholder = pos==='top' ? '▲端' : '▼端';
    inp.className = 'seat' + (!s.name.trim() ? ' empty-s' : s.veg ? ' veg' : s.kid ? ' kid' : s.help ? ' help' : ' filled');
    var composing2 = false;
    inp.addEventListener('compositionstart', function(){ composing2=true; });
    inp.addEventListener('compositionend', function(){ composing2=false; });
    inp.onblur = function(){
      if(composing2) return;
      s.name = inp.value.trim(); inp.value = s.name;
      inp.className = 'seat' + (!s.name ? ' empty-s' : s.veg ? ' veg' : s.kid ? ' kid' : s.help ? ' help' : ' filled');
      updateStat(); scheduleSave();
    };
    inp.onkeydown = function(e){ if(e.key==='Enter'&&!composing2) inp.blur(); };
    inp.oncontextmenu = function(e){
      e.preventDefault(); e.stopPropagation();
      showTagMenu(e, s, inp, pos==='top'?'▲側邊':'▼側邊');
    };
    var _pt=null;
    inp.addEventListener('touchstart', function(e){
      _pt=setTimeout(function(){
        var tc=e.touches[0];
        showTagMenu({clientX:tc.clientX,clientY:tc.clientY,preventDefault:function(){},stopPropagation:function(){}},s,inp,pos==='top'?'▲側邊':'▼側邊');
      },600);
    },{passive:true});
    inp.addEventListener('touchend',function(){clearTimeout(_pt);},{passive:true});
    inp.addEventListener('touchmove',function(){clearTimeout(_pt);},{passive:true});
    wrap.appendChild(inp);
    return wrap;
  }

  // 主桌：左1｜桌名｜右1
  function makeMCard(t) {
    var div = document.createElement('div');
    div.className = 'tcard maincard';
    var lbl = document.createElement('div'); lbl.className = 'tlabel-center'; lbl.textContent = '✦ 主 桌 ✦';
    div.appendChild(lbl);
    var body = document.createElement('div'); body.className = 'm-body';
    var lc = document.createElement('div'); lc.className = 'm-seats'; lc.appendChild(makeSeat(t,0));
    var mid = makeMid(t);
    var rc = document.createElement('div'); rc.className = 'm-seats'; rc.appendChild(makeSeat(t,1));
    body.appendChild(lc); body.appendChild(mid); body.appendChild(rc);
    div.appendChild(body);
    return div;
  }

  function render() {
    // 左側
    var lc = document.getElementById('leftCol'); lc.innerHTML='';
    tables.filter(function(t){return t.zone==='left';}).forEach(function(t){ lc.appendChild(makeHCard(t)); });

    // 右側
    var rc = document.getElementById('rightCol'); rc.innerHTML='';
    tables.filter(function(t){return t.zone==='right';}).forEach(function(t){
      var eo={};
      if(t.endSeats&&t.endSeats['top']) eo.endTop=true;
      if(t.endSeats&&t.endSeats['bot']) eo.endBot=true;
      rc.appendChild(makeHCard(t,eo));
    });

    // 下沉：固定 4×3 格位，直接讀 poolSlots[0..11]，格位10永遠走道
    var pg = document.getElementById('poolGrid'); pg.innerHTML='';
    for (var row=0; row<4; row++) {
      var rowEl=document.createElement('div'); rowEl.className='pool-row';
      for (var col=0; col<3; col++) {
        var slotIdx = row*3+col;
        if (slotIdx===10) {
          var hasMain = tables.some(function(t){ return t.type==='m'; });
          if (hasMain) {
            var spacer=document.createElement('div'); rowEl.appendChild(spacer);
          } else {
            var tid10 = poolSlots[slotIdx];
            var pt10 = tid10 ? get(tid10) : null;
            if (pt10) {
              var eopts10 = {};
              if (pt10.endSeats && pt10.endSeats['top']) eopts10.endTop = true;
              if (pt10.endSeats && pt10.endSeats['bot']) eopts10.endBot = true;
              rowEl.appendChild(makeVCard(pt10, eopts10));
            } else {
              var emp10=document.createElement('div'); emp10.className='empty-cell pool-empty'; emp10.textContent='＋';
              (function(si){ emp10.onclick=function(){ doAddPoolAtSlot(si); }; })(slotIdx);
              rowEl.appendChild(emp10);
            }
          }
        } else {
          var tid = poolSlots[slotIdx];
          var pt = tid ? get(tid) : null;
          if (pt) {
            var eopts = {};
            // 短邊椅由使用者手動加，不自動顯示
            rowEl.appendChild(makeVCard(pt, eopts));
          } else {
            var emp=document.createElement('div'); emp.className='empty-cell pool-empty'; emp.textContent='＋';
            (function(si){ emp.onclick=function(){ doAddPoolAtSlot(si); }; })(slotIdx);
            rowEl.appendChild(emp);
          }
        }
      }
      pg.appendChild(rowEl);
    }

    // 主桌
    var mz = document.getElementById('mainZone'); mz.innerHTML='';
    var mainTables = tables.filter(function(t){return t.type==='m';});
    mainTables.forEach(function(t){ mz.appendChild(makeMCard(t)); });
    if (mainTables.length === 0) {
      var addMainBtn = document.createElement('button');
      addMainBtn.className = 'btn ghost';
      addMainBtn.style.cssText = 'font-size:12px;margin:4px auto;display:block;';
      addMainBtn.textContent = '＋ 加回主桌';
      addMainBtn.onclick = function(){
        // 清空 slot 10
        poolSlots[10] = null;
        addTable('pool','m','主桌');
        render(); scheduleSave();
      };
      mz.appendChild(addMainBtn);
    }

    // 舞台
    var sg = document.getElementById('stageRow'); sg.innerHTML='';
    tables.filter(function(t){return t.zone==='stage';}).forEach(function(t){ sg.appendChild(makeVCard(t)); });
    if (countZone('stage') < MAX_STAGE) {
      var emp=document.createElement('div'); emp.className='empty-cell'; emp.style.minWidth='130px';
      emp.textContent='＋ 舞台桌'; emp.onclick=function(){ doAddStage(); };
      sg.appendChild(emp);
    }

    updateStat();
  }

  function doAddPool() {
    var hasMain = tables.some(function(t){ return t.type==='m'; });
    var slot=-1;
    for(var s=0;s<12;s++){ if(s===10 && hasMain) continue; if(poolSlots[s]===null){slot=s;break;} }
    if(slot<0){ alert('水池區已達最大桌數'); return; }
    var label = prompt('桌名稱', (countZone('pool')+13)+'桌');
    if (label===null) return;
    var t = addTable('pool','v', label||'新桌', slot);
    render(); openSheet(t.id, null);
  }

  function doAddPoolAtSlot(slot) {
    if(poolSlots[slot]!==null) return;
    var label = prompt('桌名稱', '新桌');
    if(label===null) return;
    var t = addTable('pool','v', label||'新桌', slot);
    render(); openSheet(t.id, null);
  }

  function doAddStage() {
    if (countZone('stage') >= MAX_STAGE) { alert('舞台區已達最大桌數（'+MAX_STAGE+'桌）'); return; }
    var n = countZone('pool') + countZone('left') + countZone('right') + countZone('stage') + 1;
    var label = prompt('桌名稱', n+'桌');
    if (label===null) return;
    var t = addTable('stage','v', label||n+'桌');
    render(); openSheet(t.id, null);
  }

  // ── 彈窗 ──
  function openSheet(id, focusIdx) {
    editing = id; draft = null; draftName = null;
    var t = get(id);
    document.getElementById('mTitle').textContent = t.label;
    document.getElementById('tableNameInput').value = t.label;
    var diagText = t.type==='h' ? '橫桌 · 左欄＝上排，右欄＝下排（6人）' :
                   t.type==='v' ? '直桌 · 左3右3對坐（6人）' : '主桌 · 雙人';
    document.getElementById('mDiag').textContent = diagText;

    // 固定桌不顯示刪除
    var isFixed = t.zone==='left' || t.zone==='right';
    document.getElementById('delWrap').style.display = isFixed ? 'none' : 'block';

    document.getElementById('seatList').innerHTML = '<div style="font-size:11px;color:#aaa;text-align:center;padding:8px 0;">直接點座位格輸入姓名<br>右鍵可標記素食／兒童</div>';

    // 側邊椅選項：只有水池直桌首尾排 和 左右側橫桌 可加
    var eopts = document.getElementById('endSeatOptions');
    var ebtns = document.getElementById('endSeatBtns');
    ebtns.innerHTML = '';
    var canTop = false, canBot = false;
    if (t.type === 'v' && t.zone === 'pool') {
      var col = t.slotIdx % 3, row = Math.floor(t.slotIdx / 3);
      canTop = (row === 0);
      var hasMainForBot = tables.some(function(t2){ return t2.type==='m'; });
      canBot = (row === 3 && (t.slotIdx !== 10 || !hasMainForBot));
    }
    // 右側欄橫桌：只有走道側（left）可加側邊椅
    var canSide = false; // 右側欄不加側邊椅
    // 水池直桌首尾排
    if (t.type === 'v' && t.zone === 'pool') {
      var row2 = Math.floor(t.slotIdx / 3);
      canTop = (row2 === 0);
      canBot = (row2 === 3 && t.slotIdx !== 10);
    }
    if (t.zone === 'stage') {
      canTop = true; canBot = true;
    }
    if (canTop || canBot || canSide) {
      eopts.style.display = 'block';
      function makeEndBtn(pos, label) {
        var hasEnd = !!(t.endSeats && t.endSeats[pos] !== undefined);
        var btn = document.createElement('button');
        btn.className = 'btn ghost';
        btn.style.fontSize = '12px';
        btn.textContent = hasEnd ? ('✓ 已加' + label) : ('＋ 加' + label);
        btn.onclick = function() {
          if (!t.endSeats) t.endSeats = {};
          if (hasEnd) {
            delete t.endSeats[pos];
            hasEnd = false;
          } else {
            t.endSeats[pos] = { name: '', veg: false, kid: false, help: false };
            hasEnd = true;
          }
          btn.textContent = hasEnd ? ('✓ 已加' + label) : ('＋ 加' + label);
          render(); scheduleSave();
        };
        return btn;
      }
      if (canTop) ebtns.appendChild(makeEndBtn('top', '上方側邊椅'));
      if (canBot) ebtns.appendChild(makeEndBtn('bot', '下方側邊椅'));
      if (canSide) ebtns.appendChild(makeEndBtn('left', '走道側邊椅（A/D旁）'));
    } else {
      eopts.style.display = 'none';
    }

    document.getElementById('mask').classList.add('show');
  }

  function ensureDraft(){ if(!draft) draft=clone(get(editing).seats); }

  document.getElementById('saveBtn').onclick=function(){
    var t=get(editing);
    var newName=document.getElementById('tableNameInput').value.trim();
    if(newName) t.label=newName;
    draft=null;
    document.getElementById('mask').classList.remove('show');
    render();
    scheduleSave();
  };
  document.getElementById('cancelBtn').onclick=function(){
    draft=null; document.getElementById('mask').classList.remove('show');
  };
  document.getElementById('delBtn').onclick=function(){
    if(!confirm('確定刪除「'+get(editing).label+'」？')) return;
    var t=get(editing);
    if(t.zone==='pool'&&t.type==='v'&&t.slotIdx>=0) poolSlots[t.slotIdx]=null;
    tables=tables.filter(function(x){return x.id!==editing;});
    draft=null; document.getElementById('mask').classList.remove('show'); render(); scheduleSave();
  };
  document.getElementById('mask').onclick=function(e){
    if(e.target===document.getElementById('mask')){ draft=null; document.getElementById('mask').classList.remove('show'); }
  };

  document.getElementById('addPoolBtn').onclick=doAddPool;
  document.getElementById('addStageBtn').onclick=doAddStage;
  // 重新編列桌號：左1-6、右7-12固定，pool/stage 依格位順序重排
  document.getElementById('renumberBtn').onclick=function(){
    if(!confirm('重新編列桌號？\n自訂名稱的桌次也會被覆蓋。')) return;
    // 左側固定
    var ln=1;
    tables.filter(function(t){return t.zone==='left';}).forEach(function(t){ t.label=ln+'桌'; ln++; });
    // 右側固定
    var rn=7;
    tables.filter(function(t){return t.zone==='right';}).forEach(function(t){ t.label=rn+'桌'; rn++; });
    // pool 依格位順序重編（跳過10）
    var pn=13;
    for(var s=0;s<12;s++){
      if(s===10) continue;
      if(poolSlots[s]){var pt=get(poolSlots[s]); if(pt){pt.label=pn+'桌'; pn++;}}
    }
    // 主桌
    tables.filter(function(t){return t.type==='m';}).forEach(function(t){ t.label='主桌'; });
    // stage 接續
    var sn=pn;
    tables.filter(function(t){return t.zone==='stage';}).forEach(function(t){ t.label=sn+'桌'; sn++; });
    render();
  };

  document.getElementById('clearBtn').onclick=function(){
    if(!confirm('清除所有座位姓名？')) return;
    tables.forEach(function(t){t.seats.forEach(function(s){s.name='';s.veg=false;s.kid=false;s.help=false;});});
    render();
  };
  document.getElementById('printBtn').onclick=function(){ window.print(); };

  function updateStat(){
    var seated=0,veg=0,kid=0,totalcap=0,maincap=0,empty=0;
    tables.forEach(function(t){
      totalcap += t.seats.length;
      if(t.type==='m') maincap += t.seats.length;
      t.seats.forEach(function(s){if(s.name.trim()){seated++;if(s.veg)veg++;if(s.kid)kid++;}else{empty++;}});
      if(t.endSeats){ Object.values(t.endSeats).forEach(function(s){ if(s.name.trim()){seated++;totalcap++;if(s.veg)veg++;if(s.kid)kid++;} }); }
    });
    document.getElementById('totalcap').textContent=totalcap;
    document.getElementById('maincap').textContent=maincap;
    document.getElementById('seated').textContent=seated;
    var ec=document.getElementById('emptyc'); if(ec) ec.textContent=empty;
    document.getElementById('vegc').textContent=veg;
    document.getElementById('kidc').textContent=kid;
    document.getElementById('tablec').textContent=tables.length;
  }


  // ── 啟動（所有宣告完成後才執行）──
  seed();
  if (TOKEN) {
    setStatus('saving', '載入中…');
    fetch(BASE_URL + '?token=' + encodeURIComponent(TOKEN) + '&action=getSeatData')
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (data && data.order && data.order.groomName) {
          document.getElementById('coupleTitle').textContent =
            data.order.groomName + ' & ' + data.order.brideName + '　' + (data.order.weddingDate || '');
        }
        if (data && data.seat && data.seat.tables && data.seat.tables.length > 0) {
          tables = [];
          for (var _p=0;_p<12;_p++) poolSlots[_p] = null;
          data.seat.tables.forEach(function(t) {
            tables.push({ id: t.id, zone: t.zone, type: t.type, label: t.label,
                          seats: t.seats, slotIdx: t.slotIdx !== undefined ? t.slotIdx : -1 });
          });
          seq = Math.max.apply(null, tables.map(function(t){ return t.id; })) || 0;
          if (data.seat.poolSlots) data.seat.poolSlots.forEach(function(v,i){ poolSlots[i] = v; });
          render();
          setStatus('saved', '✓ 已載入上次儲存資料');
        } else {
          setStatus('saved', '');
        }
      })
      .catch(function(e){ setStatus('error', '載入失敗：' + e.message); });
  }

});
</script>
